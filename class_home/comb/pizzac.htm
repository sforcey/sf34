<body>




<script>


function pizza(){
var mynum = document.getElementById('usernum').value;
var x = parseFloat(mynum);
var i = 1;
var k = 0;
var total = 0;
while (i < 4) {
var j = 1;
if (i>2) {j=j+1};
while (j < 3) {
k = k+1;
j = j+1;
};
i = i+1;
};
total = k*mynum;
//document.write("You get" + total + "pizza options. Try another?");
document.getElementById("output-box").textContent ="You get "+ total + " pizzas. Try another?";
};

</script>

<body>


How many toppings options are there for your pizza? Enter to count total pizza options. Note that the cheese stuffed crust is only in large.

</div>
