<script>
 
   // JSON objects
const myset = {
    "name": "Stefan",
    "age": 51,
    "hobby": {
	"reading" : true,
	"gaming" : false,
	"sport" : "cycling"
    },
    "class" : ["JavaScript", "HTML", "CSS"]
};

const S = {
    "A": null,
    "B": null,
    "C": {
	"x": null,
	"y": null,
	"5": null
    },
    "7": null
};

// accessing JSON object
console.log(myset.name); 
console.log(myset.hobby); 

console.log(myset.hobby.sport); 
console.log(myset.class[1]); 

console.log(S); 
console.log(S.C);
console.log("B" in S); 
console.log("b" in S); 
console.log("x" in S); 
console.log("x" in S.C); 

</script>
